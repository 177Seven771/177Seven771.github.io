<!DOCTYPE html>
<html lang="uk">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Card - Basic</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>Basic</h2>
        </div>
        
        <div class="price">
            <h1>$99</h1>
        </div>
        
        <div class="options">
            <div class="opt">Option</div>
            <div class="opt gray">Option</div>
            <div class="opt">Option</div>
            <div class="opt gray">Option</div>
            <div class="opt">Option</div>
            <div class="opt gray">Option</div>
        </div>
        
        <div class="action">
            <button class="btn">Purchase</button>
        </div>
    </div>

</body>
</html>
